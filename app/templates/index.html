{% extends "base.html" %}
{% block content %}

<style>
  .dashboard-title {
    font-size: 26px;
    margin-bottom: 6px;
  }

  .dashboard-sub {
    color: #4a5568;
    margin-bottom: 25px;
  }

  .dashboard {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 22px;
    padding: 10px 4px;
  }

  .button-card {
    background: #ffffff;
    padding: 26px 18px;
    border-radius: 10px;
    border: 1px solid #e2e8f0;
    text-align: center;
    font-size: 18px;
    font-weight: 600;
    transition: 0.2s;
    box-shadow: rgba(0, 0, 0, 0.03) 0px 4px 12px;
  }

  .button-card:hover {
    background: #f7fafc;
    border-color: #cbd5e0;
    transform: translateY(-3px);
    box-shadow: rgba(0, 0, 0, 0.08) 0px 8px 18px;
    cursor: pointer;
  }

  .button-card a {
    display: block;
    text-decoration: none;
    color: #1a202c;
  }

  .button-card span.icon {
    font-size: 32px;
    display: block;
    margin-bottom: 10px;
  }

  /* --- Signatur unten rechts --- */
  .signature {
    margin-top: 40px;
    text-align: right;
    font-size: 12px;
    color: #6b7280;
    opacity: 0.7;
    font-style: italic;
    padding-right: 6px;
    /* Animation: sanftes Reinfahren + dezenter Glow-Puls */
    animation:
      signatureEnter 1.1s ease-out forwards,
      signatureGlow 5s ease-in-out infinite 1.2s;
  }

  @keyframes signatureEnter {
    0% {
      opacity: 0;
      transform: translate(18px, 4px);
    }
    60% {
      opacity: 0.95;
      transform: translate(0, 0);
    }
    100% {
      opacity: 0.8;
      transform: translate(0, 0);
    }
  }

  @keyframes signatureGlow {
    0%, 100% {
      text-shadow: none;
      opacity: 0.7;
    }
    50% {
      text-shadow: 0 0 6px rgba(59, 130, 246, 0.35);
      opacity: 1;
    }
  }
</style>

<h2 class="dashboard-title">Willkommen im Pflege-Abrechnungssystem</h2>
<p class="dashboard-sub">Bitte wähle einen Bereich aus:</p>

<div class="dashboard">

  <div class="button-card">
    <a href="/hilfsmittel">
      <span class="icon">🩹</span>
      Pflegehilfsmittel
    </a>
  </div>

  <div class="button-card">
    <a href="/kassen">
      <span class="icon">🏦</span>
      Pflegekassen / Kostenträger
    </a>
  </div>

  <div class="button-card">
    <a href="/patients">
      <span class="icon">👤</span>
      Patienten
    </a>
  </div>

  <div class="button-card">
    <a href="/abrechnungen">
      <span class="icon">📄</span>
      Abrechnung erstellen
    </a>
  </div>

  <div class="button-card">
    <a href="/absenden">
      <span class="icon">📨</span>
      Abrechnungen absenden
    </a>
  </div>

  <div class="button-card">
    <a href="/archiv">
      <span class="icon">🗂️</span>
      Archiv
    </a>
  </div>

  <div class="button-card">
    <a href="/config">
      <span class="icon">⚙️</span>
      Konfiguration
    </a>
  </div>

</div>

<div class="signature">
  made in Backoffice
</div>

{% endblock %}
